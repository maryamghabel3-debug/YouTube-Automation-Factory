name: Factory Telegram Bot
on:
  schedule: [{cron: '*/5 * * * *'}]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: git-push-main
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install requests pynacl
      - name: Run FactoryBot
        env:
          TELEGRAM_BOT_TOKEN_FACTORY: ${{ secrets.TELEGRAM_BOT_TOKEN_FACTORY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: python scripts/factory_bot.py
      - name: Push bot state changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TELEGRAM_BOT_TOKEN_FACTORY: ${{ secrets.TELEGRAM_BOT_TOKEN_FACTORY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "YouTube Factory Bot"
          git config user.email "bot@youtube-factory.ai"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git" || true
          git add channels/ .github/workflows/*.yml || true
          if ! git diff --staged --quiet; then
            git commit -m "🤖 FactoryBot state update [$(date "+%Y-%m-%d %H:%M")]"
            PUSHED=0
            for i in 1 2 3 4 5; do
              if git push; then
                echo "✅ Pushed successfully"
                PUSHED=1
                break
              fi
              echo "⚠️ Push rejected (attempt $i/5), rebasing onto latest main..."
              git fetch origin main
              git rebase origin/main
              sleep $((RANDOM % 5 + 2))
            done
            if [ "$PUSHED" != "1" ]; then
              echo "❌ All 5 push attempts failed -- state changes from this run (possibly"
              echo "   including a just-completed OAuth connection) were LOST because this"
              echo "   runner's working directory is thrown away when the job ends."
              # Best-effort Telegram alert so a lost OAuth-connection commit is never
              # silently invisible -- this exact scenario happened once in production
              # (2026-07-04) before persist-credentials:false was added to fix the
              # underlying cause; this is a safety net in case it ever recurs for a
              # different reason (e.g. a genuine concurrent-run race).
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN_FACTORY}/sendMessage" \
                -d "chat_id=${TELEGRAM_CHAT_ID}" \
                -d "text=⚠️ هشدار فنی: ذخیره‌ی وضعیت بات (مثلاً یک اتصال OAuth تازه) بعد از ۵ تلاش پوش نشد. لطفاً /oauth یا هر دستوری که اخیراً زدید رو دوباره امتحان کنید." \
                > /dev/null || true
            fi
          fi
