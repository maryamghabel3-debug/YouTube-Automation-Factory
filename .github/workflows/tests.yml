name: Tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-vazirmatn
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run test suite
        run: python -m pytest tests/ -v
