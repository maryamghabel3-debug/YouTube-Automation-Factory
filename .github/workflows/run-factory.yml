name: Run YouTube Factory
on:
  schedule: [{cron: '0 3 * * *'}]   # once a day at 03:00 UTC
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Build videos only, do not upload (1 = skip upload)'
        required: false
        default: '0'
      target_minutes:
        description: 'Target narration length per video (minutes)'
        required: false
        default: '8'
      only_channel:
        description: 'Only process this channel id (blank = all active channels)'
        required: false
        default: ''
      deliver_mode:
        description: 'How to deliver the finished video: telegram | release | both'
        required: false
        default: 'both'
      make_shorts:
        description: 'Auto-generate 2-3 vertical Shorts per video (1 = yes)'
        required: false
        default: '1'

concurrency:
  group: git-push-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-vazirmatn
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run the factory
        env:
          # Multi-provider LLM fallback chain (core/llm_router.py) -- script
          # writing, competitor-pattern analysis, and Shorts hook-selection
          # all try these in order so one exhausted quota never stops
          # content production. All are free or have a free/no-card tier;
          # only set the ones you have -- missing ones are silently skipped.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Iranian Rial-payment aggregators (no international card needed) --
          # see docs/LLM-PROVIDERS-2026.md for the AvalAI vs GapGPT comparison
          # that led to this order.
          AVALAI_API_KEY: ${{ secrets.AVALAI_API_KEY }}
          AVALAI_MODEL: ${{ secrets.AVALAI_MODEL }}
          GAPGPT_API_KEY: ${{ secrets.GAPGPT_API_KEY }}
          GAPGPT_MODEL: ${{ secrets.GAPGPT_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          # Hard spending caps for the paid providers above (core/usage_guard.py) --
          # defaults ($0.50/day, $5/month) apply if these secrets are unset.
          LLM_DAILY_BUDGET_USD: ${{ secrets.LLM_DAILY_BUDGET_USD }}
          LLM_MONTHLY_BUDGET_USD: ${{ secrets.LLM_MONTHLY_BUDGET_USD }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          # Per-channel refresh tokens — the FactoryBot (factory-bot.yml) adds
          # a new line here automatically via core/workflow_editor.py whenever
          # a new channel finishes OAuth device-flow approval, so you should
          # rarely need to add one by hand.
          YOUTUBE_REFRESH_TOKEN_ELINA: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ELINA }}
          YOUTUBE_REFRESH_TOKEN_LUXE: ${{ secrets.YOUTUBE_REFRESH_TOKEN_LUXE }}
          YOUTUBE_REFRESH_TOKEN_LUXURY_LIFESTYLE_EN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_LUXURY_LIFESTYLE_EN }}
          TELEGRAM_BOT_TOKEN_FACTORY: ${{ secrets.TELEGRAM_BOT_TOKEN_FACTORY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
          SKIP_UPLOAD: ${{ github.event.inputs.skip_upload || '0' }}
          TARGET_MINUTES: ${{ github.event.inputs.target_minutes || '8' }}
          ONLY_CHANNEL: ${{ github.event.inputs.only_channel || '' }}
          DELIVER_MODE: ${{ github.event.inputs.deliver_mode || 'both' }}
          MAKE_SHORTS: ${{ github.event.inputs.make_shorts || '1' }}
        run: python main.py
      - name: Push performance log & channel database changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "YouTube Factory Bot"
          git config user.email "bot@youtube-factory.ai"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git" || true
          git add channels/ || true
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Factory run [$(date +%Y-%m-%d)]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "✅ Pushed successfully"
                break
              fi
              echo "⚠️ Push rejected (attempt $i/5), rebasing onto latest main..."
              git fetch origin main
              git rebase origin/main
              sleep $((RANDOM % 5 + 2))
            done
          fi
      - name: Upload rendered videos as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factory-output-videos
          path: output/*.mp4
          retention-days: 14
